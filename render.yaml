services:
  - type: web
    name: ai-symptom-checker
    env: python
    plan: free
    runtime: python-3.11
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --worker-class sync --timeout 60
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: 1
    healthCheckPath: /health
    healthCheckInterval: 10
    healthCheckTimeout: 5
    maxShutdownDelay: 30
