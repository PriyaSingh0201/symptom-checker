{% extends 'base.html' %}
{% block title %}History • Symptom Checker{% endblock %}

{% block content %}
<section class="page-card">
  <div class="section-heading">
    <p class="eyebrow">Assessment history</p>
    <h1>Your saved evaluations</h1>
    <p>Review, search, and download previous assessment reports.</p>
  </div>

  <div class="history-toolbar">
    <input id="history-search" type="text" placeholder="Search by symptom or condition" />
    <select id="history-severity">
      <option value="">All severities</option>
      <option value="Mild">Mild</option>
      <option value="Moderate">Moderate</option>
      <option value="Severe">Severe</option>
    </select>
    <select id="history-sort">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
    </select>
  </div>

  <div id="history-list" class="history-list"></div>
</section>
{% endblock %}

{% block scripts %}
<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login';

  async function loadHistory() {
    const params = new URLSearchParams({
      keyword: document.getElementById('history-search').value,
      severity: document.getElementById('history-severity').value,
      sort: document.getElementById('history-sort').value,
    });

    const response = await fetch(`/api/history?${params.toString()}`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    const data = await response.json();
    const list = document.getElementById('history-list');
    if (!response.ok) {
      list.innerHTML = '<p>Unable to load history.</p>';
      return;
    }

    if (!data.assessments.length) {
      list.innerHTML = '<p>No assessments found yet.</p>';
      return;
    }

    list.innerHTML = data.assessments.map(item => {
      const top3 = (item.top_conditions || [])
        .map(c => `${c.condition} (${c.confidence}%)`)
        .join(', ');
        
      const emergencyBadge = item.emergency_flag 
        ? `<span class="severity-badge severe" style="margin-left: 0.5rem; background:#EF4444; color:white;">🚨 Emergency</span>`
        : '';
        
      return `
      <article class="history-item" style="border: 1px solid var(--border-color); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; background: var(--bg-card);">
        <div class="history-top" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
          <div>
            <strong style="font-size:1.15rem; color:var(--text-dark);">${item.possible_condition} (${item.confidence_score}%)</strong>
            ${emergencyBadge}
          </div>
          <span class="severity-badge ${item.severity.toLowerCase()}">${item.severity}</span>
        </div>
        <p style="margin: 0.5rem 0; font-size:0.9rem; line-height:1.4;"><strong>Symptoms:</strong> ${item.symptoms}</p>
        ${top3 ? `<p style="margin: 0.25rem 0; font-size:0.85rem; color:var(--text-muted);"><strong>Differential Suspicions:</strong> ${top3}</p>` : ''}
        <div class="history-meta" style="font-size:0.75rem; color:var(--text-muted); display:flex; gap:1.5rem; margin-top:0.75rem;">
          <span>📅 ${item.created_date} at ${item.created_time}</span>
          <span>🩺 Department: ${item.recommended_doctor}</span>
          <span>🆔 ID: ${item.consultation_id || 'N/A'}</span>
        </div>
        <div class="history-actions" style="margin-top: 1rem; display:flex; gap:0.5rem; border-top: 1px solid var(--border-color); padding-top:0.75rem;">
          <a class="ghost-btn" href="/api/download-pdf/${item.id}" target="_blank">Download PDF</a>
          <button class="primary-btn reopen-btn" type="button" data-reopen="${item.id}">Reopen Consultation</button>
          <button class="secondary-btn delete-btn" type="button" data-id="${item.id}" style="margin-left:auto;">Delete</button>
        </div>
      </article>
      `;
    }).join('');

    list.querySelectorAll('button[data-reopen]').forEach(button => {
      button.addEventListener('click', () => {
        const id = button.getAttribute('data-reopen');
        localStorage.setItem('reopen_assessment_id', id);
        window.location.href = '/assessment';
      });
    });

    list.querySelectorAll('button[data-id]').forEach(button => {
      button.addEventListener('click', async () => {
        const id = button.getAttribute('data-id');
        await fetch(`/api/history/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
        loadHistory();
      });
    });
  }

  document.getElementById('history-search').addEventListener('input', loadHistory);
  document.getElementById('history-severity').addEventListener('change', loadHistory);
  document.getElementById('history-sort').addEventListener('change', loadHistory);

  loadHistory();
</script>
{% endblock %}
