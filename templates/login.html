{% extends 'base.html' %}
{% block title %}Login • Symptom Checker{% endblock %}

{% block content %}
<section class="auth-container">
  <div class="auth-card">
    <div class="auth-hero">
      <div class="auth-logo-wrap">
        <img class="auth-logo" src="{{ url_for('static', filename='images/logo.png') }}" alt="Symptom Checker logo" />
      </div>
      <h1 data-i18n="welcomeBack">Welcome back</h1>
      <p data-i18n="loginIntro">Sign in to continue your health journey with AI-guided insights.</p>
    </div>
    <form id="login-form" class="auth-form">
      <input type="email" name="email" placeholder="Email address" required />
      <input type="password" name="password" placeholder="Password" required />
      <button class="primary-btn" type="submit" data-i18n="login">Login</button>
      <p class="auth-switch"><span data-i18n="newHere">New here?</span> <a href="{{ url_for('auth.register_page') }}" data-i18n="createAccount">Create an account</a></p>
      <div id="form-message" class="form-message"></div>
    </form>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const form = event.currentTarget;
    const message = document.getElementById('form-message');
    const payload = {
      email: form.email.value,
      password: form.password.value,
    };

    message.textContent = 'Signing you in...';
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await response.json();
    if (response.ok) {
      localStorage.setItem('token', data.token);
      document.cookie = `token=${data.token}; path=/; max-age=86400`;
      window.location.href = '/dashboard';
    } else {
      message.textContent = data.error || 'Login failed';
    }
  });
</script>
{% endblock %}
